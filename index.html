<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Livia Jovana LS — Nails Design</title>
    <meta name="description" content="Livia Jovana LS — Nail Design premium. Arte, elegância e sofisticação nas suas unhas. Agende pelo WhatsApp." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Jost:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #FBF8F3;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }

      #loading-screen.hide {
        opacity: 0;
        pointer-events: none;
      }

      #loading-screen .ls-logo {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        font-weight: 700;
        color: #D4A574;
        letter-spacing: 0.1em;
        animation: ls-pulse 1.2s ease-in-out infinite;
      }

      @keyframes ls-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>

    <script src="/bootstrap.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CISwIdaz.css">
  </head>
  <body>
    <div id="loading-screen">
      <span class="ls-logo">LS</span>
    </div>

    <div id="root"></div>
  </body>
</html>
