      /* Esconde o hero inteiro até a primeira imagem carregar */
      #hero {
        opacity: 0;

        opacity: 1;

    </style>
    <script>
      document.addEventListener('load', function(e) {
        if (e.target && e.target.tagName === 'IMG') {
          var hero = document.getElementById('hero');
          if (hero && e.target.closest && e.target.closest('#hero')) {
            hero.classList.add('hero-ready');
          }
        }
      }, true);
    </script>
